# Railway build recipe (single service: FastAPI serves the built React bundle).
# Set a Volume mounted at /data and DATA_DIR=/data in the dashboard.
[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "npm --prefix frontend ci || npm --prefix frontend install",
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",   # -> frontend/dist, served by FastAPI
  "python backend/seed_cache.py",      # placeholder cache images for DEMO_MODE
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
